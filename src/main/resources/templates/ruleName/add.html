<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Add Rule</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">

	<div class="row">
		<h2>Add New Rule</h2>
	</div>

	<div class="row mt-4">
		<div class="col-md-8">
			<form th:action="@{/ruleName/validate}"
				  th:object="${ruleName}"
				  method="post">

				<div class="mb-3">
					<label class="form-label">Name</label>
					<input type="text" th:field="*{name}" class="form-control w-50">
					<p class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">Description</label>
					<input type="text" th:field="*{description}" class="form-control w-50">
					<p class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">Json</label>
					<input type="text" th:field="*{json}" class="form-control w-50">
				</div>

				<div class="mb-3">
					<label class="form-label">Template</label>
					<input type="text" th:field="*{template}" class="form-control w-50">
				</div>

				<div class="mb-3">
					<label class="form-label">SQL Str</label>
					<input type="text" th:field="*{sqlStr}" class="form-control w-50">
				</div>

				<div class="mb-3">
					<label class="form-label">SQL Part</label>
					<input type="text" th:field="*{sqlPart}" class="form-control w-50">
				</div>

				<a href="/ruleName/list" class="btn btn-danger btn-sm">Cancel</a>
				<button type="submit" class="btn btn-primary btn-sm">Add Rule</button>
			</form>
		</div>
	</div>

</div>
</body>
</html>
