<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Add Curve Point</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">

	<div class="row">
		<h2>Add New Curve Point</h2>
	</div>

	<div class="row mt-4">
		<div class="col-md-8">
			<form th:action="@{/curvePoint/validate}"
				  th:object="${curvePoint}"
				  method="post">

				<div class="mb-3">
					<label class="form-label">Curve Id</label>
					<input type="number" th:field="*{curveId}" class="form-control w-50">
					<p class="text-danger" th:if="${#fields.hasErrors('curveId')}" th:errors="*{curveId}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">Term</label>
					<input type="number" step="any" th:field="*{term}" class="form-control w-50">
					<p class="text-danger" th:if="${#fields.hasErrors('term')}" th:errors="*{term}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">Value</label>
					<input type="number" step="any" th:field="*{value}" class="form-control w-50">
					<p class="text-danger" th:if="${#fields.hasErrors('value')}" th:errors="*{value}"></p>
				</div>

				<a href="/curvePoint/list" class="btn btn-danger btn-sm">Cancel</a>
				<button type="submit" class="btn btn-primary btn-sm">Add Curve Point</button>
			</form>
		</div>
	</div>

</div>
</body>
</html>
