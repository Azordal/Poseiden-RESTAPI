<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Update User</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">

	<div class="row mb-4">
		<h2>Update User</h2>
	</div>

	<div class="row">
		<div class="col-md-8">

			<form th:action="@{/user/update/{id}(id=${user.id})}"
				  th:object="${user}"
				  method="post">

				<div class="mb-3">
					<label class="form-label">Username</label>
					<input type="text" th:field="*{username}" class="form-control w-50">
					<p class="text-danger"
					   th:if="${#fields.hasErrors('username')}"
					   th:errors="*{username}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">New Password</label>
					<input type="password" th:field="*{password}" class="form-control w-50">
					<small class="text-muted">
						Minimum 8 characters, one uppercase letter, one number and one symbol.
					</small>
					<p class="text-danger"
					   th:if="${#fields.hasErrors('password')}"
					   th:errors="*{password}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">Full Name</label>
					<input type="text" th:field="*{fullname}" class="form-control w-50">
					<p class="text-danger"
					   th:if="${#fields.hasErrors('fullname')}"
					   th:errors="*{fullname}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">Role</label>
					<select th:field="*{role}" class="form-control w-50">
						<option value="">Select role</option>
						<option value="USER">USER</option>
						<option value="ADMIN">ADMIN</option>
					</select>
					<p class="text-danger"
					   th:if="${#fields.hasErrors('role')}"
					   th:errors="*{role}"></p>
				</div>

				<a href="/user/list" class="btn btn-danger btn-sm">Cancel</a>
				<button type="submit" class="btn btn-primary btn-sm">Update User</button>
			</form>

		</div>
	</div>

</div>
</body>
</html>
