<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8"/>
	<title>Bid List</title>

	<link rel="stylesheet"
		  href="../../css/bootstrap.min.css">
</head>

<body>

<div class="container">

	<div class="row">

		<div class="col-6">
			<h2>Bid List</h2>
		</div>

		<div class="col-6 text-end">

			<a href="/bidList/add"
			   class="btn btn-primary btn-sm">
				Add New Bid
			</a>
		</div>
	</div>
	<br>

	<table class="table table-striped">

		<thead>

		<tr>

			<th>Account</th>

			<th>Type</th>

			<th>Bid Quantity</th>

			<th>Action</th>

		</tr>
		</thead>
		<tbody>

		<tr th:each="bid : ${bidLists}">

			<td th:text="${bid.account}"></td>

			<td th:text="${bid.type}"></td>

			<td th:text="${bid.bidQuantity}"></td>

			<td>

				<a th:href="@{/bidList/update/{id}(id=${bid.bidListId})}"
				   class="btn btn-success btn-sm">
					Update
				</a>

				<a th:href="@{/bidList/delete/{id}(id=${bid.bidListId})}"
				   class="btn btn-danger btn-sm">
					Delete
				</a>
			</td>
		</tr>
		</tbody>
	</table>
</div>
</body>
</html>
