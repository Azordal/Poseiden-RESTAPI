<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="utf-8"/>
	<title>Bid List</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>
<div class="container mt-4">

	<div class="row mb-4">
		<div class="col-6">
			<a href="/bidList/list">Bid List</a> |
			<a href="/curvePoint/list">Curve Points</a> |
			<a href="/rating/list">Ratings</a> |
			<a href="/trade/list">Trade</a> |
			<a href="/ruleName/list">Rule</a>
		</div>

		<div class="col-6 text-end">
			<span>Logged in user: <strong sec:authentication="name">admin</strong></span>
			<form th:action="@{/app/logout}" method="post" style="display:inline;">
				<button type="submit" class="btn btn-light btn-sm border">Logout</button>
			</form>
		</div>
	</div>

	<h2>Bid List</h2>

	<a href="/bidList/add" class="btn btn-primary btn-sm mb-2">Add New</a>

	<table class="table table-bordered">
		<thead>
		<tr>
			<th>Id</th>
			<th>Account</th>
			<th>Type</th>
			<th>Bid Quantity</th>
			<th>Action</th>
		</tr>
		</thead>

		<tbody>
		<tr th:each="bid : ${bidLists}">
			<td th:text="${bid.bidListId}"></td>
			<td th:text="${bid.account}"></td>
			<td th:text="${bid.type}"></td>
			<td th:text="${bid.bidQuantity}"></td>
			<td>
				<a th:href="@{/bidList/update/{id}(id=${bid.bidListId})}">Edit</a>
				|
				<a th:href="@{/bidList/delete/{id}(id=${bid.bidListId})}">Delete</a>
			</td>
		</tr>
		</tbody>
	</table>

</div>
</body>
</html>
