<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Rating List</title>
	<link rel="stylesheet" href="../../css/bootstrap.min.css">
</head>
<body>
<div class="container">
	<div class="row">
		<h2>Rating List</h2>
	</div>

	<div class="row">
		<a href="/rating/add" class="btn btn-primary btn-sm mb-3">Add New</a>
		<table class="table table-bordered table-striped">
			<thead>
			<tr>
				<th>Id</th>
				<th>Moodys Rating</th>
				<th>S&amp;P Rating</th>
				<th>Fitch Rating</th>
				<th>Order Number</th>
				<th>Action</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="rating : ${ratings}">
				<td th:text="${rating.id}"></td>
				<td th:text="${rating.moodysRating}"></td>
				<td th:text="${rating.sandPRating}"></td>
				<td th:text="${rating.fitchRating}"></td>
				<td th:text="${rating.orderNumber}"></td>
				<td>
					<a th:href="@{/rating/update/{id}(id=${rating.id})}">Edit</a>
					<a th:href="@{/rating/delete/{id}(id=${rating.id})}">Delete</a>
				</td>
			</tr>
			</tbody>
		</table>
	</div>
</div>
</body>
</html>
