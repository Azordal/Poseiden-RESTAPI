<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Trade List</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">

	<div class="row">
		<div class="col-6">
			<h2>Trade List</h2>
		</div>
		<div class="col-6 text-end">
			<a href="/trade/add" class="btn btn-primary btn-sm">Add New Trade</a>
		</div>
	</div>

	<br>

	<table class="table table-striped">
		<thead>
		<tr>
			<th>Account</th>
			<th>Type</th>
			<th>Buy Quantity</th>
			<th>Action</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="trade : ${trades}">
			<td th:text="${trade.account}"></td>
			<td th:text="${trade.type}"></td>
			<td th:text="${trade.buyQuantity}"></td>
			<td>
				<a th:href="@{/trade/update/{id}(id=${trade.tradeId})}" class="btn btn-success btn-sm">Edit</a>
				<a th:href="@{/trade/delete/{id}(id=${trade.tradeId})}" class="btn btn-danger btn-sm">Delete</a>
			</td>
		</tr>
		</tbody>
	</table>

</div>
</body>
</html>
