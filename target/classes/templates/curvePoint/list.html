<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Curve Point List</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">

	<div class="row">
		<div class="col-6">
			<h2>Curve Point List</h2>
		</div>
		<div class="col-6 text-end">
			<a href="/curvePoint/add" class="btn btn-primary btn-sm">Add New</a>
		</div>
	</div>

	<br>

	<table class="table table-striped">
		<thead>
		<tr>
			<th>Curve Id</th>
			<th>Term</th>
			<th>Value</th>
			<th>Action</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="curvePoint : ${curvePoints}">
			<td th:text="${curvePoint.curveId}"></td>
			<td th:text="${curvePoint.term}"></td>
			<td th:text="${curvePoint.value}"></td>
			<td>
				<a th:href="@{/curvePoint/update/{id}(id=${curvePoint.id})}" class="btn btn-success btn-sm">Edit</a>
				<a th:href="@{/curvePoint/delete/{id}(id=${curvePoint.id})}" class="btn btn-danger btn-sm">Delete</a>
			</td>
		</tr>
		</tbody>
	</table>

</div>
</body>
</html>
