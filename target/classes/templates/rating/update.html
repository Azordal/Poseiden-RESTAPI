<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8"/>
	<title>Update Rating</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>

<div class="container mt-4">

	<h2 class="mb-4">Update Rating</h2>

	<form th:action="@{/rating/update/{id}(id=${rating.id})}"
		  th:object="${rating}"
		  method="post">

		<!-- Moody's Rating -->

		<div class="mb-3">
			<label class="form-label">Moody's Rating</label>

			<input type="text"
				   th:field="*{moodysRating}"
				   class="form-control w-50">

			<p class="text-danger"
			   th:if="${#fields.hasErrors('moodysRating')}"
			   th:errors="*{moodysRating}"></p>
		</div>

		<!-- S&P Rating -->

		<div class="mb-3">
			<label class="form-label">S&amp;P Rating</label>

			<input type="text"
				   th:field="*{sandPRating}"
				   class="form-control w-50">

			<p class="text-danger"
			   th:if="${#fields.hasErrors('sandPRating')}"
			   th:errors="*{sandPRating}"></p>
		</div>

		<!-- Fitch Rating -->

		<div class="mb-3">
			<label class="form-label">Fitch Rating</label>

			<input type="text"
				   th:field="*{fitchRating}"
				   class="form-control w-50">

			<p class="text-danger"
			   th:if="${#fields.hasErrors('fitchRating')}"
			   th:errors="*{fitchRating}"></p>
		</div>

		<!-- Order Number -->

		<div class="mb-3">
			<label class="form-label">Order Number</label>

			<input type="number"
				   th:field="*{orderNumber}"
				   class="form-control w-50">

			<p class="text-danger"
			   th:if="${#fields.hasErrors('orderNumber')}"
			   th:errors="*{orderNumber}"></p>
		</div>

		<!-- Buttons -->

		<div class="mt-3">

			<a href="/rating/list"
			   class="btn btn-danger">
				Cancel
			</a>

			<button type="submit"
					class="btn btn-primary">
				Update
			</button>

		</div>

	</form>

</div>

</body>
</html>
