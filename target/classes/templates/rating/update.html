<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Update Rating</title>
	<link rel="stylesheet" href="../../css/bootstrap.min.css">
</head>
<body>
<div class="container">
	<div class="row">
		<h2>Update Rating</h2>
	</div>

	<div class="row">
		<form th:action="@{/rating/update/{id}(id=${rating.id})}"
			  th:object="${rating}"
			  method="post"
			  class="form-horizontal"
			  style="width: 100%">

			<div class="form-group">
				<label for="moodysRating">Moodys Rating</label>
				<input type="text" th:field="*{moodysRating}" id="moodysRating" class="col-4">
				<p class="text-danger" th:if="${#fields.hasErrors('moodysRating')}" th:errors="*{moodysRating}"></p>
			</div>

			<div class="form-group">
				<label for="sandPRating">S&amp;P Rating</label>
				<input type="text" th:field="*{sandPRating}" id="sandPRating" class="col-4">
				<p class="text-danger" th:if="${#fields.hasErrors('sandPRating')}" th:errors="*{sandPRating}"></p>
			</div>

			<div class="form-group">
				<label for="fitchRating">Fitch Rating</label>
				<input type="text" th:field="*{fitchRating}" id="fitchRating" class="col-4">
				<p class="text-danger" th:if="${#fields.hasErrors('fitchRating')}" th:errors="*{fitchRating}"></p>
			</div>

			<div class="form-group">
				<label for="orderNumber">Order Number</label>
				<input type="number" th:field="*{orderNumber}" id="orderNumber" class="col-4">
				<p class="text-danger" th:if="${#fields.hasErrors('orderNumber')}" th:errors="*{orderNumber}"></p>
			</div>

			<div class="form-group">
				<a class="btn btn-danger btn-sm" href="/rating/list">Cancel</a>
				<input class="btn btn-primary btn-sm" type="submit" value="Update Rating">
			</div>
		</form>
	</div>
</div>
</body>
</html>
