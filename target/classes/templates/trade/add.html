<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Add Trade</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">

	<div class="row">
		<h2>Add New Trade</h2>
	</div>

	<div class="row mt-4">
		<div class="col-md-8">
			<form th:action="@{/trade/validate}"
				  th:object="${trade}"
				  method="post">

				<div class="mb-3">
					<label class="form-label">Account</label>
					<input type="text" th:field="*{account}" class="form-control w-50">
					<p class="text-danger" th:if="${#fields.hasErrors('account')}" th:errors="*{account}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">Type</label>
					<input type="text" th:field="*{type}" class="form-control w-50">
					<p class="text-danger" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>
				</div>

				<div class="mb-3">
					<label class="form-label">Buy Quantity</label>
					<input type="number" step="any" th:field="*{buyQuantity}" class="form-control w-50">
					<p class="text-danger" th:if="${#fields.hasErrors('buyQuantity')}" th:errors="*{buyQuantity}"></p>
				</div>

				<a href="/trade/list" class="btn btn-danger btn-sm">Cancel</a>
				<button type="submit" class="btn btn-primary btn-sm">Add Trade</button>
			</form>
		</div>
	</div>

</div>
</body>
</html>
