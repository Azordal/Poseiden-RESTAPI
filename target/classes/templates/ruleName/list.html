<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<title>Rule List</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">

	<div class="row">
		<div class="col-6">
			<h2>Rule List</h2>
		</div>
		<div class="col-6 text-end">
			<a href="/ruleName/add" class="btn btn-primary btn-sm">Add New</a>
		</div>
	</div>

	<br>

	<table class="table table-striped">
		<thead>
		<tr>
			<th>Name</th>
			<th>Description</th>
			<th>Json</th>
			<th>Template</th>
			<th>SQL Str</th>
			<th>SQL Part</th>
			<th>Action</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="ruleName : ${ruleNames}">
			<td th:text="${ruleName.name}"></td>
			<td th:text="${ruleName.description}"></td>
			<td th:text="${ruleName.json}"></td>
			<td th:text="${ruleName.template}"></td>
			<td th:text="${ruleName.sqlStr}"></td>
			<td th:text="${ruleName.sqlPart}"></td>
			<td>
				<a th:href="@{/ruleName/update/{id}(id=${ruleName.id})}" class="btn btn-success btn-sm">Edit</a>
				<a th:href="@{/ruleName/delete/{id}(id=${ruleName.id})}" class="btn btn-danger btn-sm">Delete</a>
			</td>
		</tr>
		</tbody>
	</table>

</div>
</body>
</html>
