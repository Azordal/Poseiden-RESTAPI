<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="utf-8"/>
	<title>Rule List</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>
<div class="container mt-4">

	<div class="row mb-4">
		<div class="col-6">
			<a href="/bidList/list">Bid List</a> |
			<a href="/curvePoint/list">Curve Points</a> |
			<a href="/rating/list">Ratings</a> |
			<a href="/trade/list">Trade</a> |
			<a href="/ruleName/list">Rule</a>
		</div>

		<div class="col-6 text-end">
			<span>Logged in user: <strong sec:authentication="name">admin</strong></span>
			<form th:action="@{/app/logout}" method="post" style="display:inline;">
				<button type="submit" class="btn btn-light btn-sm border">Logout</button>
			</form>
		</div>
	</div>

	<h2>Rule List</h2>

	<a href="/ruleName/add" class="btn btn-primary btn-sm mb-2">Add New</a>

	<table class="table table-bordered">
		<thead>
		<tr>
			<th>Id</th>
			<th>Name</th>
			<th>Description</th>
			<th>Json</th>
			<th>Template</th>
			<th>SQL</th>
			<th>SQL Part</th>
			<th>Action</th>
		</tr>
		</thead>

		<tbody>
		<tr th:each="ruleName : ${ruleNames}">
			<td th:text="${ruleName.id}"></td>
			<td th:text="${ruleName.name}"></td>
			<td th:text="${ruleName.description}"></td>
			<td th:text="${ruleName.json}"></td>
			<td th:text="${ruleName.template}"></td>
			<td th:text="${ruleName.sqlStr}"></td>
			<td th:text="${ruleName.sqlPart}"></td>
			<td>
				<a th:href="@{/ruleName/update/{id}(id=${ruleName.id})}">Edit</a>
				|
				<a th:href="@{/ruleName/delete/{id}(id=${ruleName.id})}">Delete</a>
			</td>
		</tr>
		</tbody>
	</table>

</div>
</body>
</html>
