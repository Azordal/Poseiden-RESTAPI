<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="utf-8"/>

	<title>Update Bid</title>

	<link rel="stylesheet"
		  href="../../css/bootstrap.min.css">

</head>

<body>

<div class="container">

	<div class="row">

		<h2>Update Bid</h2>

	</div>

	<div class="row">

		<form th:action="@{/bidList/update/{id}(id=${bidList.bidListId})}"
			  th:object="${bidList}"
			  method="post"
			  class="form-horizontal">

			<!-- Account -->

			<div class="form-group">

				<label class="col-sm-2 control-label">

					Account

				</label>

				<div class="col-sm-10">

					<input type="text"
						   th:field="*{account}"
						   class="col-4">

					<p class="text-danger"
					   th:if="${#fields.hasErrors('account')}"
					   th:errors="*{account}"></p>

				</div>

			</div>

			<!-- Type -->

			<div class="form-group">

				<label class="col-sm-2 control-label">

					Type

				</label>

				<div class="col-sm-10">

					<input type="text"
						   th:field="*{type}"
						   class="col-4">

					<p class="text-danger"
					   th:if="${#fields.hasErrors('type')}"
					   th:errors="*{type}"></p>

				</div>

			</div>

			<!-- Bid Quantity -->

			<div class="form-group">

				<label class="col-sm-2 control-label">

					Bid Quantity

				</label>

				<div class="col-sm-10">

					<input type="number"
						   step="any"
						   th:field="*{bidQuantity}"
						   class="col-4">

					<p class="text-danger"
					   th:if="${#fields.hasErrors('bidQuantity')}"
					   th:errors="*{bidQuantity}"></p>

				</div>

			</div>

			<!-- Buttons -->

			<div class="form-group">

				<div class="col-sm-12">

					<a href="/bidList/list"
					   class="btn btn-danger btn-sm">
						Cancel
					</a>

					<input class="btn btn-primary btn-sm"
						   type="submit"
						   value="Update">

				</div>

			</div>

		</form>

	</div>

</div>

</body>

</html>
