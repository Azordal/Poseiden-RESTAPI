<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8"/>
	<title>Update Bid</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>

<div class="container mt-4">

	<h2 class="mb-4">Update Bid</h2>

	<form th:action="@{/bidList/update/{id}(id=${bidList.bidListId})}"
		  th:object="${bidList}"
		  method="post">

		<!-- Account -->

		<div class="mb-3">
			<label class="form-label">Account</label>

			<input type="text"
				   th:field="*{account}"
				   class="form-control w-50">

			<p class="text-danger"
			   th:if="${#fields.hasErrors('account')}"
			   th:errors="*{account}"></p>

		</div>

		<!-- Type -->

		<div class="mb-3">
			<label class="form-label">Type</label>

			<input type="text"
				   th:field="*{type}"
				   class="form-control w-50">

			<p class="text-danger"
			   th:if="${#fields.hasErrors('type')}"
			   th:errors="*{type}"></p>

		</div>

		<!-- Bid Quantity -->

		<div class="mb-3">
			<label class="form-label">Bid Quantity</label>

			<input type="number"
				   step="any"
				   th:field="*{bidQuantity}"
				   class="form-control w-50">

			<p class="text-danger"
			   th:if="${#fields.hasErrors('bidQuantity')}"
			   th:errors="*{bidQuantity}"></p>

		</div>

		<!-- Buttons -->

		<div class="mt-3">

			<a href="/bidList/list"
			   class="btn btn-danger">
				Cancel
			</a>

			<button type="submit"
					class="btn btn-primary">
				Update
			</button>

		</div>

	</form>

</div>

</body>
</html>
